name: 📚 Docs issue
description: Missing, wrong, or confusing documentation
labels: ["docs"]
body:
  - type: input
    id: url
    attributes:
      label: Docs URL
      placeholder: "https://plexui.com/docs/components/..."
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What's wrong?
      description: Typo, missing info, unclear example, broken link, etc.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix (optional)
